<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AetherStream</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: #1e293b;
            border-bottom: 1px solid #334155;
        }
        h1 {
            font-size: 1.25rem;
            margin: 0;
            font-weight: 600;
            letter-spacing: -0.025em;
        }
        .status {
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #64748b;
        }
        .status-dot.connected {
            background: #10b981;
        }
        .status-dot.disconnected {
            background: #ef4444;
        }
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            gap: 1.5rem;
        }
        .viewer-card {
            width: 100%;
            max-width: 1000px;
            aspect-ratio: 16/9;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        #stream-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
        }
        .placeholder {
            color: #94a3b8;
            font-size: 0.95rem;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            width: 100%;
            max-width: 1000px;
            align-items: center;
            justify-content: space-between;
            background: #1e293b;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid #334155;
        }
        .stats {
            display: flex;
            gap: 1.5rem;
            font-size: 0.875rem;
            color: #94a3b8;
        }
        .stats span {
            color: #f8fafc;
            font-weight: 500;
        }
        .actions {
            display: flex;
            gap: 0.5rem;
        }
        input[type="text"] {
            background: #0f172a;
            border: 1px solid #334155;
            color: #f8fafc;
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.875rem;
            width: 260px;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #3b82f6;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: 500;
            font-size: 0.875rem;
            cursor: pointer;
            transition: background 0.15s ease;
        }
        button:hover {
            background: #2563eb;
        }
        button.disconnect {
            background: #ef4444;
        }
        button.disconnect:hover {
            background: #dc2626;
        }
        button.secondary {
            background: #334155;
            color: #f8fafc;
        }
        button.secondary:hover {
            background: #475569;
        }
    </style>
</head>
<body>

<header>
    <h1>AetherStream</h1>
    <div class="status">
        <div id="status-dot" class="status-dot disconnected"></div>
        <span id="status-text">Disconnected</span>
    </div>
</header>

<main>
    <div class="viewer-card" id="viewer-card">
        <div id="placeholder" class="placeholder">No active stream. Start the sender to begin.</div>
        <img id="stream-img" alt="Stream Feed" />
    </div>

    <div class="controls">
        <div class="stats">
            <div>FPS: <span id="fps-val">0</span></div>
            <div>Resolution: <span id="resolution-val">0 x 0</span></div>
        </div>
        <div class="actions">
            <input type="text" id="server-url" placeholder="ws://localhost:8000/ws/viewer" />
            <button id="connect-btn">Connect</button>
            <button id="fullscreen-btn" class="secondary">Fullscreen</button>
        </div>
    </div>
</main>

<script>
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const placeholder = document.getElementById('placeholder');
    const streamImg = document.getElementById('stream-img');
    const fpsVal = document.getElementById('fps-val');
    const resolutionVal = document.getElementById('resolution-val');
    const serverUrlInput = document.getElementById('server-url');
    const connectBtn = document.getElementById('connect-btn');
    const fullscreenBtn = document.getElementById('fullscreen-btn');
    const viewerCard = document.getElementById('viewer-card');

    let ws = null;
    let frameCount = 0;
    let lastFpsUpdate = performance.now();
    let reconnectTimeout = null;

    function getDefaultWsUrl() {
        if (window.location.protocol === 'file:') {
            return 'ws://127.0.0.1:8000/ws/viewer';
        }
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        return `${protocol}//${window.location.host}/ws/viewer`;
    }

    serverUrlInput.value = getDefaultWsUrl();

    function updateStatus(connected, text = '') {
        if (connected) {
            statusDot.className = 'status-dot connected';
            statusText.textContent = 'Connected';
            connectBtn.textContent = 'Disconnect';
            connectBtn.className = 'disconnect';
        } else {
            statusDot.className = 'status-dot disconnected';
            statusText.textContent = text || 'Disconnected';
            connectBtn.textContent = 'Connect';
            connectBtn.className = '';
            
            placeholder.style.display = 'block';
            streamImg.style.display = 'none';
            fpsVal.textContent = '0';
            resolutionVal.textContent = '0 x 0';
        }
    }

    function connect() {
        if (reconnectTimeout) clearTimeout(reconnectTimeout);
        if (ws) ws.close();

        const url = serverUrlInput.value.trim();
        if (!url) return;

        updateStatus(false, 'Connecting...');

        try {
            ws = new WebSocket(url);
            ws.binaryType = 'arraybuffer';

            ws.onopen = () => {
                updateStatus(true);
                frameCount = 0;
                lastFpsUpdate = performance.now();
            };

            ws.onmessage = (event) => {
                const now = performance.now();
                frameCount++;
                if (now - lastFpsUpdate >= 1000) {
                    fpsVal.textContent = Math.round((frameCount * 1000) / (now - lastFpsUpdate));
                    frameCount = 0;
                    lastFpsUpdate = now;
                }

                const blob = new Blob([event.data], { type: 'image/jpeg' });
                const newUrl = URL.createObjectURL(blob);
                
                const oldUrl = streamImg.src;
                streamImg.src = newUrl;
                if (oldUrl && oldUrl.startsWith('blob:')) {
                    URL.revokeObjectURL(oldUrl);
                }

                if (streamImg.style.display !== 'block') {
                    placeholder.style.display = 'none';
                    streamImg.style.display = 'block';
                }
            };

            ws.onclose = () => {
                updateStatus(false, 'Disconnected');
                reconnectTimeout = setTimeout(connect, 2000);
            };

            ws.onerror = () => {
                updateStatus(false, 'Error');
            };
        } catch (e) {
            updateStatus(false, 'Error');
        }
    }

    function disconnect() {
        if (reconnectTimeout) clearTimeout(reconnectTimeout);
        if (ws) {
            ws.close();
            ws = null;
        }
        updateStatus(false, 'Disconnected');
    }

    connectBtn.addEventListener('click', () => {
        if (ws && ws.readyState === WebSocket.OPEN) {
            disconnect();
        } else {
            connect();
        }
    });

    streamImg.onload = () => {
        resolutionVal.textContent = `${streamImg.naturalWidth} x ${streamImg.naturalHeight}`;
    };

    fullscreenBtn.addEventListener('click', () => {
        if (!document.fullscreenElement) {
            if (viewerCard.requestFullscreen) {
                viewerCard.requestFullscreen();
            } else if (viewerCard.webkitRequestFullscreen) {
                viewerCard.webkitRequestFullscreen();
            } else if (viewerCard.msRequestFullscreen) {
                viewerCard.msRequestFullscreen();
            }
        } else {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        }
    });

    connect();
</script>
</body>
</html>
