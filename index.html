<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Viewer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #181818;
            color: #e5e5e5;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1.5rem;
            background: #222222;
            border-bottom: 1px solid #333333;
            height: 48px;
            box-sizing: border-box;
            z-index: 10;
        }
        .header-left {
            display: flex;
            align-items: center;
        }
        .status {
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: #a3a3a3;
        }
        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #737373;
        }
        .status-dot.connected {
            background: #10b981;
        }
        .status-dot.disconnected {
            background: #ef4444;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            font-size: 0.85rem;
        }
        .stats {
            display: flex;
            gap: 1.25rem;
            color: #a3a3a3;
        }
        .stats span {
            color: #e5e5e5;
            font-weight: 500;
        }
        button {
            background: #333333;
            color: #e5e5e5;
            border: 1px solid #444444;
            padding: 0.35rem 0.75rem;
            border-radius: 4px;
            font-weight: 500;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.15s ease;
        }
        button:hover {
            background: #444444;
        }
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #181818;
            box-sizing: border-box;
            padding: 1rem;
            width: 100vw;
            height: calc(100vh - 48px);
        }
        .video-container {
            width: 100%;
            height: 100%;
            background: #121212;
            border: 1px solid #333333;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-sizing: border-box;
            padding: 0.5rem;
        }
        #stream-img {
            max-width: 100%;
            max-height: 100%;
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
        }
        .placeholder {
            color: #737373;
            font-size: 0.9rem;
        }

        /* Mobile Optimization */
        @media (max-width: 480px) {
            header {
                padding: 0.5rem 1rem;
            }
            .header-right {
                gap: 0.75rem;
                font-size: 0.75rem;
            }
            .stats {
                gap: 0.75rem;
            }
            main {
                padding: 0.5rem;
            }
            .video-container {
                padding: 0.25rem;
            }
            button {
                padding: 0.25rem 0.5rem;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div class="status">
            <div id="status-dot" class="status-dot disconnected"></div>
            <span id="status-text">Disconnected</span>
        </div>
    </div>
    <div class="header-right">
        <div class="stats">
            <div>FPS: <span id="fps-val">0</span></div>
            <div>Res: <span id="resolution-val">0 x 0</span></div>
        </div>
        <button id="fullscreen-btn">Fullscreen</button>
    </div>
</header>

<main>
    <div class="video-container" id="viewer-container">
        <div id="placeholder" class="placeholder">No active stream. Waiting for sender...</div>
        <img id="stream-img" alt="Stream Feed" />
    </div>
</main>

<script>
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const placeholder = document.getElementById('placeholder');
    const streamImg = document.getElementById('stream-img');
    const fpsVal = document.getElementById('fps-val');
    const resolutionVal = document.getElementById('resolution-val');
    const fullscreenBtn = document.getElementById('fullscreen-btn');
    const viewerContainer = document.getElementById('viewer-container');

    let ws = null;
    let frameCount = 0;
    let lastFpsUpdate = performance.now();
    let reconnectTimeout = null;

    function getWsUrl() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        if (window.location.protocol === 'file:') {
            return 'ws://127.0.0.1:8000/ws/viewer';
        }
        return `${protocol}//${window.location.host}/ws/viewer`;
    }

    function updateStatus(connected, text = '') {
        if (connected) {
            statusDot.className = 'status-dot connected';
            statusText.textContent = 'Connected';
        } else {
            statusDot.className = 'status-dot disconnected';
            statusText.textContent = text || 'Disconnected';
            
            placeholder.style.display = 'block';
            streamImg.style.display = 'none';
            fpsVal.textContent = '0';
            resolutionVal.textContent = '0 x 0';
        }
    }

    function connect() {
        if (reconnectTimeout) clearTimeout(reconnectTimeout);
        if (ws) ws.close();

        const url = getWsUrl();
        updateStatus(false, 'Connecting...');

        try {
            ws = new WebSocket(url);
            ws.binaryType = 'arraybuffer';

            ws.onopen = () => {
                updateStatus(true);
                frameCount = 0;
                lastFpsUpdate = performance.now();
            };

            ws.onmessage = (event) => {
                const now = performance.now();
                frameCount++;
                if (now - lastFpsUpdate >= 1000) {
                    fpsVal.textContent = Math.round((frameCount * 1000) / (now - lastFpsUpdate));
                    frameCount = 0;
                    lastFpsUpdate = now;
                }

                const blob = new Blob([event.data], { type: 'image/jpeg' });
                const newUrl = URL.createObjectURL(blob);
                
                const oldUrl = streamImg.src;
                streamImg.src = newUrl;
                if (oldUrl && oldUrl.startsWith('blob:')) {
                    URL.revokeObjectURL(oldUrl);
                }

                if (streamImg.style.display !== 'block') {
                    placeholder.style.display = 'none';
                    streamImg.style.display = 'block';
                }
            };

            ws.onclose = () => {
                updateStatus(false, 'Disconnected');
                reconnectTimeout = setTimeout(connect, 2000);
            };

            ws.onerror = () => {
                updateStatus(false, 'Error');
            };
        } catch (e) {
            updateStatus(false, 'Error');
        }
    }

    streamImg.onload = () => {
        resolutionVal.textContent = `${streamImg.naturalWidth} x ${streamImg.naturalHeight}`;
    };

    fullscreenBtn.addEventListener('click', () => {
        if (!document.fullscreenElement) {
            if (viewerContainer.requestFullscreen) {
                viewerContainer.requestFullscreen();
            } else if (viewerContainer.webkitRequestFullscreen) {
                viewerContainer.webkitRequestFullscreen();
            } else if (viewerContainer.msRequestFullscreen) {
                viewerContainer.msRequestFullscreen();
            }
        } else {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        }
    });

    connect();
</script>
</body>
</html>
